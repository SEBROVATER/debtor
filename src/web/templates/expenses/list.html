<section class="expense-list">
  <header>
    <h2>Expenses</h2>
    <p class="hint" data-no-settlement="true">
      Expenses are tracked only. No settlement or payment actions are available.
    </p>
  </header>

  {{> expenses/partials/expense_form }}

  <ul class="expenses">
    {{#each expenses}}
    <li class="expense-item" data-expense-id="{{id}}">
      <span class="expense-summary">{{payer_name}} paid {{amount}} {{currency}}</span>
      <span class="expense-date">{{expense_date}}</span>
      {{#if note}}
      <p class="expense-note">{{note}}</p>
      {{/if}}
      <form method="post" action="/groups/{{group_id}}/expenses/{{id}}">
        <input type="hidden" name="_method" value="DELETE" />
        <button type="submit">Delete</button>
      </form>
    </li>
    {{/each}}
  </ul>
</section>
